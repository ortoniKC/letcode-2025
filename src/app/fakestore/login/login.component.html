<section class="section">
  <div class="container">
    <h1 class="title has-text-primary is-clickable" [routerLink]="['/home']">Fake Store</h1>
    <div class="columns is-centered" *ngIf="!isLoggedIn">
      <div class="column">
        <app-ads-square></app-ads-square>
      </div>
      <div class="column is-two-fifths">
        <div class="box">
          <h2 class="title">Login</h2>
          <div class="field">
            <label class="label">Username</label>
            <div class="control has-icons-left has-icons-right">
              <input class="input" [(ngModel)]="username" placeholder="Enter Username" />
              <span class="icon is-small is-left">
                <i class="fas fa-user"></i>
              </span>
            </div>
          </div>
          <div class="field">
            <label class="label">Password</label>
            <div class="control has-icons-left has-icons-right">
              <input class="input" [(ngModel)]="password" type="password" placeholder="Enter Password" />
              <span class="icon is-small is-left">
                <i class="fas fa-lock"></i>
              </span>
            </div>
          </div>
          <button class="button is-primary" (click)="login()" [class.is-loading]="isLoading"
            [disabled]="isLoading">Login</button>
          <hr>
          <div class="field">
            <p>Username: mor_2314</p>
            <p>Password: 83r5^_</p>
          </div>
        </div>
      </div>
      <div class="column">
      </div>
    </div>
    <div class="content">
      <p class="subtitle">Credit: Built using <a class="is-link has-text-primary"
          href="https://fakestoreapi.com/">Fakestoreapi</a>
      </p>
    </div>
  </div>
</section>
<app-ads></app-ads>
