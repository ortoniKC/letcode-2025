<app-pageheader [header]="'Windows'"></app-pageheader>
<section class="section ">
    <div class="container">
        <div class="columns is-multiline">
            <div class="column is-6-desktop is-8-tablet">
                <div class="card">
                    <div class="card-content">
                        <div class="field">
                            <label class="label" for="home">Goto Home</label>
                            <div class="control">
                                <button id="home" class="button is-info" (click)="openRequestedPopup()">Open Home
                                    Page</button>
                            </div>
                        </div>
                        <div class="field">
                            <label class="label" for="home">Open muiltple windows</label>
                            <div class="buttons">
                                <button id="multi" class="button is-link is-outlined"
                                    (click)="openRequestedPopup2()">Muiltiple windows</button>
                            </div>
                        </div>
                        <div class="block">
                            <div class="content">
                                <ol type="1">
                                    <li>Click on the home button</li>
                                    <li>Goto the newly opened tab</li>
                                    <li>Print the title of the page </li>
                                    <li>Close the parent window</li>
                                    <li>Close the child window</li>
                                    <li>Click on the Muiltiple windows button</li>
                                    <li>Print all the window title</li>
                                    <li>Close all the windows</li>
                                </ol>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="column is-3-desktop is-4-tablet">
                <app-learning-point [link]="link" [list]="lp"></app-learning-point>
            </div>
            <div class="column is-3-desktop">
                <app-ads-vertical></app-ads-vertical>
            </div>
        </div>
    </div>
</section>
<app-ads></app-ads>
