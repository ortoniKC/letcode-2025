<section class="section" *ngIf="selectedVideo; else notFound">
    <div class="container">
        <h1 class="title has-text-centered"></h1>

        <div class="columns">
            <div class="column is-one-third" *ngIf="selectedVideo.selenium">
                <h3 class="title is-5">Selenium</h3>
                <figure class="image is-16by9">
                    <iframe class="has-ratio" width="100%" height="315" [src]="selectedVideo.selenium | safeUrl"
                        frameborder="0" allowfullscreen>
                    </iframe>
                </figure>
            </div>

            <div class="column is-one-third" *ngIf="selectedVideo?.protractors">
                <h3 class="title is-5">Protractor</h3>
                <figure class="image is-16by9">
                    <iframe class="has-ratio" width="100%" height="315" [src]="selectedVideo.protractors | safeUrl"
                        frameborder="0" allowfullscreen>
                    </iframe>
                </figure>
            </div>

            <div class="column is-one-third" *ngIf="selectedVideo?.playwright">
                <h3 class="title is-5">Playwright</h3>
                <figure class="image is-16by9">
                    <iframe class="has-ratio" width="100%" height="315" [src]="selectedVideo.playwright | safeUrl"
                        frameborder="0" allowfullscreen>
                    </iframe>
                </figure>
            </div>
        </div>

        <div class="buttons is-large is-centered">
            <app-yt></app-yt>
        </div>
    </div>
</section>
<ng-template #notFound>
    <app-not-found></app-not-found>
</ng-template>
<app-ads></app-ads>
