<app-pageheader [header]="'Table'"></app-pageheader>
<section class="section">
    <div class="container">
        <div class="columns is-multiline">
            <div class="column is-7-desktop is-8-tablet">
                <div class="card">
                    <div class="card-content">
                        <div class="table-container">
                            <table class="table is-bordered" id="advancedtable" name="table" datatable
                                [dtOptions]="dtOptions">
                                <thead>
                                    <tr>
                                        <th>S.NO</th>
                                        <th>UNIVERSITY NAME</th>
                                        <th>COUNTRY</th>
                                        <th>WEBSITE</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let group of universities;let id = index">
                                        <td>{{ id + 1 | number }}</td>
                                        <td>{{group.name}}</td>
                                        <td>{{group.country}}</td>
                                        <td>{{group.web_pages}}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="column is-3-desktop is-4-tablet">
                <app-learning-point [link]="link" [list]="lp"></app-learning-point>
            </div>
            <div class="column">
                <ng-adsense [className]="'adsbygoogle'" [adClient]="'ca-pub-6251538267574677'" [adFormat]="'auto'"
                    [adSlot]="8487607644" [display]="'block'" [fullWidthResponsive]="true">
                </ng-adsense>
            </div>

        </div>
    </div>
</section>
<!-- ad -->
<section class="hero is-small">
    <div class="hero-body">
        <div class="column has-text-centered">
            <ng-adsense [className]="'adsbygoogle'" [adClient]="'ca-pub-6251538267574677'" [adFormat]="'auto'"
                [adSlot]="6753414644" [display]="'block'" [fullWidthResponsive]="true">
            </ng-adsense>
        </div>
    </div>
</section>
