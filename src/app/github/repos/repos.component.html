<div class="block">
  <div class="columns is-multiline">
    <div class="column is-12" *ngFor="let repo of repos">
      <div class="card">
        <div class="card-content">
          <p class="title is-5">
            <a [href]="repo.html_url" target="_blank" class="has-text-info">
              <span class="icon"><i class="fas fa-book"></i></span> {{ repo.name }}
            </a>
          </p>
          <p class="subtitle is-6">{{ repo.description || 'No description provided.' }}</p>
          <div *ngIf="repo.language">
            <span class="tag is-info is-light">
              <span class="icon is-small"><i class="fas fa-code"></i></span>
              <span>{{ repo.language }}</span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <nav class="pagination is-centered mt-4" role="navigation" aria-label="pagination">
<div class="buttons is-centered mt-4">
  <!-- Buttons go here -->
    <button class="button is-link"
        [disabled]="currentPage === 1"
        (click)="loadRepos(currentPage - 1)">
  Previous
</button>

<button class="button is-link"
        [disabled]="repos.length < perPage"
        (click)="loadRepos(currentPage + 1)">
  Next
</button>
</div>
    <ul class="pagination-list">
      <li><a class="pagination-link is-current">{{ currentPage }}</a></li>
    </ul>
  </nav>
</div>
