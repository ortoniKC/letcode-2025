# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
name: Deploy Angular SSR to Firebase

on:
  push:
    branches:
      - main  # Change if your default branch is different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Angular SSR
        run: npm run ssr  # Correct command

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PLAY_LETCODE }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > firebase.json
          firebase use --add

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,functions