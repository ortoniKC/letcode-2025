name: Deploy LetCode in FireBase

on:
  push:
    branches:
      - main

jobs:
  firebase-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-node@master
        with:
          node-version: "18.x"
      - run: npm install
      - run: npm run build
      - uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: 1//0gn4kbEEdOtoTCgYIARAAGBASNwF-L9IrjEoPuWtW1BTO5EgiyPUFDGvdn7JV1TDZ2BH9xPuCRtmS2Ev3zAVJWm90uT-jQDKgvCE
